<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Voting Location</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --ink:       hsl(219, 50%, 15%);
    --ink-soft:  #3A4258;
    --paper:     #F7F5EF;
    --paper-2:   #453f2e;
    --dark-purple:      lab(44.56% 23.23 -14);
    --light-purple:      hsl(306, 17%, 55%);
    --open:      #2F6B4F;
    --closed:    #A13A2E;
    --shadow: 0 1px 2px rgba(73, 35, 80, 0.06), 0 8px 24px rgba(27,42,74,0.06);
  }

  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family: sans-serif;
    min-height:100vh;
  }

  .wrap{ max-width:760px; margin:0 auto; padding:0 24px 80px; }

  header{
    padding: 56px 24px 4px;
    text-align:center;
    position:relative;
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:14px;
  }
  h1{
    font-family:'Fraunces', serif;
    font-optical-sizing:auto;
    font-weight:600;
    font-size:clamp(32px, 5vw, 48px);
    line-height:1.08;
    margin:0 0 12px;
    letter-spacing:-0.01em;
  }
  .sub{
    font-size:16px;
    color:var(--ink-soft);
    max-width:480px;
    margin:0 auto;
    line-height:1.5;
  }

  .stub{
    height:1px;
    margin:36px auto 0;
    max-width:760px;
    background-image:repeating-linear-gradient(90deg, var(--gold) 0 10px, transparent 10px 20px);
    opacity:.55;
  }

  .search-block{ padding:40px 0 8px; }
  form{
    display:flex;
    gap:10px;
    background:hsl(0, 0%, 100%);
    border:2px solid var(--ink);
    border-radius:10px;
    padding:6px 18px;
    box-shadow:var(--shadow);
    position:relative;
  }
  form:focus-within{ outline:3px solid var(--light-purple); outline-offset:2px; }

  .input-wrap{ position:relative; flex:1; display:flex; }

  input[type="text"]{
    flex:1;
    width:100%;
    border:none;
    outline:none;
    font-family:'Inter', sans-serif;
    font-size:17px;
    background:transparent;
    color:var(--ink);
    padding:8px 0;
  }
  input[type="text"]::placeholder{ color:var(--dark-purple); }

  /* ---------- Suggestions dropdown ---------- */
  .suggestions{
    position:absolute;
    top:calc(100% + 8px);
    left:0;
    right:0;
    background:#fff;
    border:1px solid var(--light-purple);
    border-radius:8px;
    box-shadow:var(--shadow);
    max-height:260px;
    overflow-y:auto;
    z-index:30;
  }
  .suggestions[hidden]{ display:none; }
  .suggestion-item{
    padding:11px 16px;
    font-size:15px;
    cursor:pointer;
    color:var(--ink);
    border-bottom:1px solid #F0EDE3;
  }
  .suggestion-item:last-child{ border-bottom:none; }
  .suggestion-item:hover,
  .suggestion-item.active{
    background:rgba(184,146,47,.12);
  }
  .suggestion-empty{
    padding:11px 16px;
    font-size:14px;
    color:var(--ink-soft);
    font-style:italic;
  }

  .hint{
    font-size:13px;
    color:var(--ink-soft);
    margin-top:10px;
    padding-left:4px;
  }

  #status{
    font-family: sans-serif;
    font-size:13px;
    color:var(--ink-soft);
    margin:28px 0 0;
    min-height:18px;
  }

  #results{ margin-top:20px; display:flex; flex-direction:column; gap:14px; }

  .card{
    background:#fff;
    border:1px solid var(--dark-purple);
    border-radius:8px;
    padding:20px 22px;
    box-shadow:var(--shadow);
  }
  .card h3{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:20px;
    margin:0 0 6px;
  }
  .card .addr{
    font-size:14.5px;
    color:var(--ink-soft);
    line-height:1.5;
    margin-bottom:10px;
  }
  .meta-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px 18px;
    font-size:13px;
    color:var(--ink-soft);
  }
  .meta-row span b{ color:var(--dark-purple); font-weight:600; }
  .badge{
    display:inline-block;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:.06em;
    text-transform:uppercase;
    padding:3px 9px;
    border-radius:20px;
  }
  .badge.open{ background:rgba(47,107,79,.1); color:var(--open); }
  .badge.closed{ background:rgba(161,58,46,.1); color:var(--closed); }

  .empty, .error{
    margin-top:32px;
    padding:26px;
    text-align:center;
    border:1px dashed var(--light-purple);
    border-radius:8px;
    color:var(--ink-soft);
    font-size:14.5px;
  }
  .error{ border-color:var(--closed); color:var(--closed); }

  footer{
    text-align:center;
    font-size:12.5px;
    color:#9198A8;
    margin-top:60px;
  }

  @media (max-width:480px){
    header{ padding:40px 20px 28px; }
    form{ padding:10px 14px; }
  }
</style>
</head>
<body>

<header>
  <h1>Where do I vote early in Virginia?</h1>
</header>
<!-- <div class="stub"></div> -->

<div class="wrap">
  <div class="search-block">
    <form id="search-form" role="search" aria-label="Search voting locations by county">
      <div class="input-wrap">
        <input
          type="text"
          id="county-input"
          placeholder="Start typing your county or city..."
          autocomplete="off"
          role="combobox"
          aria-expanded="false"
          aria-autocomplete="list"
          aria-controls="county-suggestions"
          aria-label="County name"
        >
        <div id="county-suggestions" class="suggestions" role="listbox" hidden></div>
      </div>
    </form>
    <div id="status">Loading voting location data…</div>
  </div>

  <div id="results"></div>
</div>

<footer>Sourced from official county records. If a location looks out of date, contact your local registrar.</footer>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQdYY982wQLn7oo76pPGXKB43Uun_TTJxJSrLGGkx2ZzHrfYKjGzRxEA5yA_WHyuEnxzaaU8mdcDHfi/pub?gid=0&single=true&output=csv";

const statusEl = document.getElementById('status');
const resultsEl = document.getElementById('results');
const form = document.getElementById('search-form');
const input = document.getElementById('county-input');
const suggestionsEl = document.getElementById('county-suggestions');

let rows = [];
let loaded = false;
let counties = [];        // unique, sorted list of real county names
let filtered = [];        // currently visible suggestions
let activeIndex = -1;     // keyboard-highlighted suggestion
let selectedCounty = '';  // the county actually chosen from the list

function normalizeKey(k){
  return k.trim().toLowerCase()
    .replace(/&/g, 'and')
    .replace(/[^a-z0-9]+/g, '_')
    .replace(/^_+|_+$/g, '');
}

function buildCountyList(){
  counties = Array.from(
    new Set(rows.map(r => (r.county || '').trim()).filter(Boolean))
  ).sort((a, b) => a.localeCompare(b));
}

function loadData(){
  if (CSV_URL.includes("PASTE_YOUR")) {
    statusEl.textContent = "";
    resultsEl.innerHTML = `<div class="error">
      No data source connected yet. Replace CSV_URL in the code with your
      published Google Sheet link (File → Share → Publish to web → CSV).
    </div>`;
    return;
  }

  Papa.parse(CSV_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    transformHeader: normalizeKey,
    complete: (res) => {
      rows = res.data;
      loaded = true;
      buildCountyList();
      statusEl.textContent = `Loaded ${rows.length} voting locations across ${counties.length} counties. Start typing a county above.`;
    },
    error: (err) => {
      statusEl.textContent = "";
      resultsEl.innerHTML = `<div class="error">Couldn't load voting data (${err.message}). Check that the sheet is published and the CSV_URL is correct.</div>`;
    }
  });
}

/* ---------- Suggestions dropdown behavior ---------- */

function openSuggestions(){
  suggestionsEl.hidden = false;
  input.setAttribute('aria-expanded', 'true');
}
function closeSuggestions(){
  suggestionsEl.hidden = true;
  input.setAttribute('aria-expanded', 'false');
  activeIndex = -1;
}

function renderSuggestions(query){
  const q = query.trim().toLowerCase();

  if (!q) {
    filtered = [];
    closeSuggestions();
    return;
  }

  // Prioritize counties that start with the query, then any that contain it
  const startsWith = counties.filter(c => c.toLowerCase().startsWith(q));
  const contains = counties.filter(c => !c.toLowerCase().startsWith(q) && c.toLowerCase().includes(q));
  filtered = [...startsWith, ...contains].slice(0, 8);

  activeIndex = -1;

  if (filtered.length === 0) {
    suggestionsEl.innerHTML = `<div class="suggestion-empty">No matching county</div>`;
    openSuggestions();
    return;
  }

  suggestionsEl.innerHTML = filtered.map((c, i) =>
    `<div class="suggestion-item" role="option" data-index="${i}">${escapeHtml(c)}</div>`
  ).join('');
  openSuggestions();
}

function highlightActive(){
  [...suggestionsEl.querySelectorAll('.suggestion-item')].forEach((el, i) => {
    el.classList.toggle('active', i === activeIndex);
  });
}

function chooseCounty(name){
  selectedCounty = name;
  input.value = name;
  closeSuggestions();
  renderResults(name);
}

input.addEventListener('input', () => {
  // Any manual edit invalidates a previous exact selection
  if (input.value !== selectedCounty) {
    selectedCounty = '';
  }
  renderSuggestions(input.value);
});

input.addEventListener('keydown', (e) => {
  if (suggestionsEl.hidden || filtered.length === 0) return;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    activeIndex = (activeIndex + 1) % filtered.length;
    highlightActive();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    activeIndex = (activeIndex - 1 + filtered.length) % filtered.length;
    highlightActive();
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (activeIndex >= 0) {
      chooseCounty(filtered[activeIndex]);
    } else if (filtered.length > 0) {
      chooseCounty(filtered[0]);
    }
  } else if (e.key === 'Escape') {
    closeSuggestions();
  }
});

suggestionsEl.addEventListener('mousedown', (e) => {
  // mousedown (not click) so it fires before the input's blur event
  const item = e.target.closest('.suggestion-item');
  if (!item) return;
  const idx = Number(item.dataset.index);
  chooseCounty(filtered[idx]);
});

document.addEventListener('click', (e) => {
  if (!form.contains(e.target)) closeSuggestions();
});

// Prevent any stray Enter/native submit from reloading the page
form.addEventListener('submit', (e) => {
  e.preventDefault();
});

/* ---------- Results ---------- */

function renderResults(countyName){
  if (!loaded) {
    resultsEl.innerHTML = `<div class="empty">Still loading data — try again in a moment.</div>`;
    return;
  }

  const matches = rows.filter(r => (r.county || '').trim().toLowerCase() === countyName.trim().toLowerCase());

  if (matches.length === 0) {
    statusEl.textContent = '';
    resultsEl.innerHTML = `<div class="empty">No voting locations found for "${escapeHtml(countyName)}".</div>`;
    return;
  }

  statusEl.textContent = `${matches.length} location${matches.length === 1 ? '' : 's'} in ${escapeHtml(countyName)}`;
  resultsEl.innerHTML = matches.map(cardHtml).join('');
}

function cardHtml(r){
  const name = r.location_name || r.location || r.site_name || 'Voting Location';
  const address = [r.address, r.city, r.zip].filter(Boolean).join(', ');
  const hours = r.hours || r.polling_hours;
  const monday_thru_friday = r.monday_thru_friday;
  const saturday_and_sunday = r.saturday_and_sunday;
  const phone = r.phone;
  const county = r.county;
  const statusRaw = (r.status || '').toLowerCase();
  const badge = statusRaw
    ? `<span class="badge ${statusRaw.includes('open') ? 'open' : 'closed'}">${escapeHtml(r.status)}</span>`
    : '';
  const notes = r.notes;

  return `
    <div class="card">
      <h3>${escapeHtml(name)}</h3>
      ${address ? `<div class="addr">${escapeHtml(address)}</div>` : ''}
      <div class="meta-row">
        ${county ? `<span><b>County:</b> ${escapeHtml(county)}</span>` : ''}
        ${hours ? `<span><b>Hours:</b> ${escapeHtml(hours)}</span>` : ''}
        ${monday_thru_friday ? `<span><b>Monday Thru Friday:</b> ${escapeHtml(monday_thru_friday)}</span>` : ''}
        ${saturday_and_sunday ? `<span><b>Saturday and Sunday:</b> ${escapeHtml(saturday_and_sunday)}</span>` : ''}
        ${phone ? `<span><b>Registrar Phone Number:</b> <a href="tel:${phone.replace(/[^0-9+]/g, '')}" class="phone-link">${escapeHtml(phone)}</a></span>` : ''}
        ${badge}
      </div>
      ${notes ? `<div class="addr" style="margin-top:8px;">${escapeHtml(notes)}</div>` : ''}
    </div>
  `;
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[m]));
}

loadData();
</script>

</body>
</html>
